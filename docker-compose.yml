services:
  liveclip:
    build: .
    image: liveclip:latest
    container_name: liveclip-server
    ports:
      - "8889:8000"
    volumes:
      - ./data:/app/data          # 录制产物、数据库、切片持久化
      - ./cache:/app/cache        # FunASR 模型缓存（避免每次重新下载）
      - ./.env:/app/.env:ro       # 环境变量
      - ./logs:/app/logs          # 日志
    restart: unless-stopped
